<!DOCTYPE html>
<html>
<head>
    <title>Document Q&A</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { width: 480px; height: 640px; background: white; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); display: flex; flex-direction: column; overflow: hidden; }
        .header { background: #1a1a1a; color: white; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
        .avatar { width: 38px; height: 38px; background: #FFF176; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
        .name { font-size: 15px; font-weight: 600; }
        .status { font-size: 12px; color: #4ade80; margin-top: 2px; }
        .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; background: #f0f2f5; }
        .msg { max-width: 82%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.6; word-wrap: break-word; }
        .bot { background: white; color: #1a1a1a; align-self: flex-start; border-radius: 4px 16px 16px 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
        .user { background: #1a1a1a; color: white; align-self: flex-end; border-radius: 16px 4px 16px 16px; }
        .sources { font-size: 11px; color: #888; margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee; }
        .sources span { display: block; margin-top: 3px; font-style: italic; }
        .typing { background: white; color: #999; align-self: flex-start; border-radius: 4px 16px 16px 16px; font-style: italic; font-size: 13px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
        .input-area { padding: 12px 16px; background: white; border-top: 1px solid #eee; display: flex; gap: 8px; align-items: center; }
        input { flex: 1; padding: 10px 16px; border: 1.5px solid #e0e0e0; border-radius: 24px; font-size: 14px; outline: none; font-family: inherit; }
        input:focus { border-color: #1a1a1a; }
        .send-btn { width: 40px; height: 40px; background: #1a1a1a; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .send-btn:hover { background: #333; }
        .send-btn svg { width: 18px; height: 18px; fill: white; }
        .hint { text-align: center; font-size: 11px; color: #aaa; padding: 6px 0 10px; background: white; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="avatar">📄</div>
        <div>
            <div class="name">Document Assistant</div>
            <div class="status">● Answers from your document only</div>
        </div>
    </div>
    <div class="messages" id="messages">
        <div class="msg bot">Hi! Ask me anything about the document. I will only answer from what is in it — no guessing.</div>
    </div>
    <div class="input-area">
        <input type="text" id="input" placeholder="Ask a question about the document..." onkeypress="if(event.key==='Enter') send()" autocomplete="off"/>
        <button class="send-btn" onclick="send()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
    <div class="hint">RAG · HuggingFace Embeddings · ChromaDB · Groq Llama 3</div>
</div>

<script>
async function send() {
    const input = document.getElementById('input');
    const messages = document.getElementById('messages');
    const text = input.value.trim();
    if (!text) return;

    // Show user message
    messages.innerHTML += '<div class="msg user">' + text + '</div>';
    input.value = '';

    // Show typing indicator
    const tid = 't' + Date.now();
    messages.innerHTML += '<div class="msg typing" id="' + tid + '">Searching document...</div>';
    messages.scrollTop = messages.scrollHeight;

    try {
        // Call the RAG API
        const r = await fetch('/ask', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: text})
        });
        const d = await r.json();

        // Remove typing indicator
        document.getElementById(tid).remove();

        // Build answer with sources
        let html = '<div class="msg bot">' + d.answer;
        if (d.sources && d.sources.length > 0) {
            html += '<div class="sources">Retrieved from document:<br>';
            d.sources.forEach((s, i) => {
                html += '<span>' + (i+1) + '. ' + s + '...</span>';
            });
            html += '</div>';
        }
        html += '</div>';
        messages.innerHTML += html;

    } catch(e) {
        document.getElementById(tid).remove();
        messages.innerHTML += '<div class="msg bot">Something went wrong. Please try again.</div>';
    }

    messages.scrollTop = messages.scrollHeight;
}
</script>
</body>
</html>
